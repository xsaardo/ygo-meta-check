services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ygo_meta
      POSTGRES_USER: ygo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ygo_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port mapping — backend reaches DB via Docker network (db:5432).
    # To connect with psql/pgAdmin locally, add: ports: ["127.0.0.1:5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ygo -d ygo_meta"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ygo:${POSTGRES_PASSWORD:-ygo_secret}@db:5432/ygo_meta
      CARD_IMAGES_DIR: /app/card_images
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - card_images:/app/card_images
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: dev
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
  card_images:
